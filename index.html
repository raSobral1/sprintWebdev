<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi - Modo SLID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Jovi - Modo SLID</h1>

    <div id="login">
        <h2>Login</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="password" id="senha" placeholder="Digite sua senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="sistema" style="display: none;">
        <h2 id="mensagem"></h2>

        <p>
            O Modo SLID ajuda o aluno a ver, escutar e identificar
            os pontos importantes da aula.
        </p>

        <button onclick="ativarSLID()">Ativar SLID</button>
        <button onclick="adicionarMateria()">Adicionar matéria</button>
        <button onclick="sair()">Sair</button>

        <h3>Matérias</h3>
        <ul id="listaMaterias"></ul>

        <h3>Slideshow</h3>
        <img id="imagem" src="imagens/see.jpg" width="400">

        <br><br>

        <button onclick="voltarImagem()">Anterior</button>
        <button onclick="proximaImagem()">Próxima</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
